name: "🔖 » generate draft release"
on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  release:
    name: "🔖 » draft release"
    runs-on: ubuntu-latest
    outputs:
      release-note: ${{ steps.changelog.outputs.changelog }}
      version: ${{ steps.version.outputs.local-version }}
      scope: ${{ steps.scope.outputs.scope }}

    steps:
      - name: 📁 » checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🦀 » install stable rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🔎 » extract scope from commit message
        id: scope
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          scope=$(printf '%s' "$COMMIT_MSG" | head -n1 | sed -n 's/^release(\([^)]*\)):.*/\1/p')
          if [ -z "$scope" ]; then
            echo "::error::release commit must be of the form 'release(<scope>): ...'"
            exit 1
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"

      - name: 🗺️ » resolve scope → Cargo.toml path
        id: meta
        env:
          SCOPE: ${{ steps.scope.outputs.scope }}
        run: |
          path=$(cargo metadata --format-version 1 --no-deps \
            | jq -r --arg s "$SCOPE" '.packages[] | select(.name==$s) | .manifest_path')
          if [ -z "$path" ]; then
            echo "::error::scope '$SCOPE' is not a workspace member"
            exit 1
          fi
          # convert absolute → repo-relative for the composite action
          rel=${path#"$GITHUB_WORKSPACE/"}
          echo "cargo_toml=./$rel" >> "$GITHUB_OUTPUT"

      - name: ⬅️ » get previous git tag for scope
        id: tag
        env:
          SCOPE: ${{ steps.scope.outputs.scope }}
        run: |
          last=$(git describe --tags --abbrev=0 --match "${SCOPE}-v*" 2>/dev/null \
            || git rev-list --max-parents=0 ${{ github.ref }})
          echo "last-tag=$last" >> "$GITHUB_OUTPUT"

      - name: 🏷️ » get versions
        uses: ./.github/actions/check-version
        id: version
        with:
          cargo-toml-path: ${{ steps.meta.outputs.cargo_toml }}

      - name: 📑 » generate changelog
        uses: lucaslabstech/action-release@v1.0.4
        id: changelog
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from: ${{ steps.tag.outputs.last-tag }}
          to: ${{ github.ref }}
          next-version: ${{ steps.scope.outputs.scope }}-v${{ steps.version.outputs.local-version }}

      - name: 🗑️ » delete outdated drafts
        uses: hugo19941994/delete-draft-releases@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔖 » create draft release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}
        with:
          prerelease: false
          draft: true
          tag_name: ${{ steps.scope.outputs.scope }}-v${{ steps.version.outputs.local-version }}
          name: ${{ steps.scope.outputs.scope }} v${{ steps.version.outputs.local-version }}
          body: ${{ steps.changelog.outputs.changelog }}
