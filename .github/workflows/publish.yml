name: "рџљЂ В» publish"

on:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  prepare:
    name: рџ—єпёЏ В» prepare
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.tag.outputs.scope }}
      version: ${{ steps.tag.outputs.version }}
      crate_dir: ${{ steps.meta.outputs.crate_dir }}
      manifest_path: ${{ steps.meta.outputs.manifest_path }}
      crates_io: ${{ steps.release.outputs.crates_io }}
      matrix: ${{ steps.release.outputs.matrix }}
      artifact_prefix: ${{ steps.tag.outputs.scope }}
    steps:
      - name: рџ“Ѓ В» checkout repository
        uses: actions/checkout@v6

      - name: рџ¦Ђ В» install stable rust
        uses: dtolnay/rust-toolchain@stable

      - name: рџЏ·пёЏ В» parse scope + version from release tag
        id: tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # tag format: <scope>-v<version>, e.g. kurv-v0.2.0
          if [[ ! "$TAG" =~ ^(.+)-v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "::error::tag '$TAG' is not in <scope>-v<version> form"
            exit 1
          fi
          echo "scope=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"

      - name: рџ—єпёЏ В» resolve scope в†’ manifest path
        id: meta
        env:
          SCOPE: ${{ steps.tag.outputs.scope }}
        run: |
          path=$(cargo metadata --format-version 1 --no-deps \
            | jq -r --arg s "$SCOPE" '.packages[] | select(.name==$s) | .manifest_path')
          if [ -z "$path" ]; then
            echo "::error::scope '$SCOPE' is not a workspace member"
            exit 1
          fi
          rel=${path#"$GITHUB_WORKSPACE/"}
          crate_dir=$(dirname "$rel")
          echo "manifest_path=$rel" >> "$GITHUB_OUTPUT"
          echo "crate_dir=$crate_dir" >> "$GITHUB_OUTPUT"

      - name: рџ“‹ В» load per-scope release manifest
        id: release
        env:
          SCOPE: ${{ steps.tag.outputs.scope }}
          CRATE_DIR: ${{ steps.meta.outputs.crate_dir }}
        run: |
          f="$CRATE_DIR/.release.yml"
          if [ ! -f "$f" ]; then
            echo "::error::missing $f вЂ” every releasable crate needs a .release.yml"
            exit 1
          fi

          crates_io=$(yq -r '.crates_io // false' "$f")
          echo "crates_io=$crates_io" >> "$GITHUB_OUTPUT"

          # expand {scope} in archive names, emit matrix as compact JSON
          matrix=$(yq -o=json '.targets' "$f" \
            | jq -c --arg s "$SCOPE" '[.[] | .archive |= (gsub("\\{scope\\}"; $s))]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: рџЏ—пёЏ В» build
    needs: prepare
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: рџ“Ѓ В» checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: рџ—ѓпёЏ В» cache cargo
        uses: Swatinem/rust-cache@v2

      - name: рџЏ—пёЏ В» build ${{ needs.prepare.outputs.scope }}
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: "build"
          target: ${{ matrix.platform.target }}
          args: "--release -p ${{ needs.prepare.outputs.scope }}"
          strip: true

      - name: рџ“¦ В» archive release
        run: |
          cd target/${{ matrix.platform.target }}/release

          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            7z a ../../../${{ matrix.platform.archive }} ${{ matrix.platform.bin }}
          else
            tar czvf ../../../${{ matrix.platform.archive }} ${{ matrix.platform.bin }}
          fi
          cd -

      - name: рџ“¤ В» upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.artifact_prefix }}-${{ matrix.platform.os_name }}
          path: ${{ matrix.platform.archive }}

  publish-gh-release:
    name: рџљЂ В» publish github release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: рџ“Ґ В» download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ needs.prepare.outputs.artifact_prefix }}-*
          merge-multiple: true

      - name: рџ“Ѓ В» list files
        run: ls -l -a -R

      - name: рџљЂ В» upload artifacts to github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ needs.prepare.outputs.artifact_prefix }}-*

  publish-crates-io:
    name: рџљЂ В» publish crates.io
    needs: [prepare, build]
    if: needs.prepare.outputs.crates_io == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: рџ“Ѓ В» checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: рџ¦Ђ В» install rust
        uses: dtolnay/rust-toolchain@stable

      - name: рџљЂ В» publish
        uses: katyo/publish-crates@v2
        with:
          path: ${{ needs.prepare.outputs.crate_dir }}
          registry-token: ${{ secrets.CRATES_TOKEN }}
